## UNICEF SDMX Chatbot — Benchmark Scenarios
## Each flow is a multi-turn conversation mimicking a real UNICEF programme officer.
## expected_mode: A = fetch new data, B = re-visualise existing data
## assertions are checked against the agent's recorded tool calls and final answer.

flows:

  # ── HEALTH / IMMUNIZATION ──────────────────────────────────────────────

  - id: health_001
    name: "DTP3 immunization Thailand trend and region"
    program_area: Health
    turns:
      - question: "What is the DTP3 immunization coverage in Thailand?"
        expected_mode: A
        assertions:
          data_retrieved: true
          visualization_created: true
          indicator_hint: ["DTP3", "diphtheria", "immunization"]
      - question: "Can you show me the same for Vietnam, Cambodia, and Myanmar?"
        expected_mode: A
        assertions:
          data_retrieved: true
          multi_country: true
      - question: "Show the trend for Thailand since 2000"
        expected_mode: B
        assertions:
          visualization_created: true

  - id: health_002
    name: "Measles vaccination in West Africa"
    program_area: Health
    turns:
      - question: "What is the measles vaccination rate in Nigeria?"
        expected_mode: A
        assertions:
          data_retrieved: true
          indicator_hint: ["measles", "MCV", "vaccination"]
      - question: "How does it compare with Ghana and Senegal?"
        expected_mode: A
        assertions:
          data_retrieved: true
          multi_country: true
      - question: "Add Burkina Faso and Ivory Coast to the comparison"
        expected_mode: A
        assertions:
          data_retrieved: true
          multi_country: true

  - id: health_003
    name: "Skilled birth attendant in South Asia"
    program_area: Health
    turns:
      - question: "What percentage of births in Bangladesh are attended by skilled health personnel?"
        expected_mode: A
        assertions:
          data_retrieved: true
          indicator_hint: ["skilled", "birth", "attendant"]
      - question: "Compare that with India, Nepal, and Pakistan"
        expected_mode: A
        assertions:
          data_retrieved: true
          multi_country: true

  - id: health_004
    name: "ANC coverage trend"
    program_area: Health
    turns:
      - question: "What is the antenatal care coverage in Ethiopia?"
        expected_mode: A
        assertions:
          data_retrieved: true
          indicator_hint: ["antenatal", "ANC", "prenatal"]
      - question: "Is there more recent data than what you showed?"
        expected_mode: A
        assertions:
          data_retrieved: true

